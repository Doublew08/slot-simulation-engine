<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="#0f0a1a"/>

  <!-- Cabinet top bar -->
  <rect x="5" y="7" width="54" height="9" rx="3" fill="#7c3aed"/>
  <rect x="5" y="7" width="54" height="9" rx="3" fill="url(#topGrad)" opacity="0.6"/>

  <!-- Three reel windows -->
  <rect x="5"  y="18" width="16" height="28" rx="3" fill="#1e0a3c" stroke="#7c3aed" stroke-width="1.5"/>
  <rect x="24" y="18" width="16" height="28" rx="3" fill="#1e0a3c" stroke="#a855f7" stroke-width="2"/>
  <rect x="43" y="18" width="16" height="28" rx="3" fill="#1e0a3c" stroke="#7c3aed" stroke-width="1.5"/>

  <!-- Payline glow -->
  <rect x="3" y="29.5" width="58" height="5" rx="1" fill="#22c55e" opacity="0.15"/>
  <line x1="3" y1="32" x2="61" y2="32" stroke="#22c55e" stroke-width="1.2" opacity="0.7"/>

  <!-- 7 7 7 -->
  <text x="13"  y="37" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="17" font-weight="900" fill="#f59e0b">7</text>
  <text x="32"  y="37" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="17" font-weight="900" fill="#fbbf24">7</text>
  <text x="51"  y="37" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="17" font-weight="900" fill="#f59e0b">7</text>

  <!-- Spin button -->
  <rect x="20" y="50" width="24" height="8" rx="4" fill="#7c3aed"/>
  <rect x="20" y="50" width="24" height="8" rx="4" fill="url(#btnGrad)" opacity="0.5"/>

  <defs>
    <linearGradient id="topGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="btnGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.2"/>
    </linearGradient>
  </defs>
</svg>
