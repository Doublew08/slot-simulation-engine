name: Slot Engine CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "20"
        
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        
    - name: Run Python Math Engine Tests
      run: |
        python tests.py
        
    - name: Run JS Browser Engine Tests
      run: |
        node docs/tests.js
        
    - name: Generate Exact Mathematical PAR Sheet
      run: |
        python analytical.py
        
    - name: Upload PAR Sheet Artifact
      uses: actions/upload-artifact@v4
      with:
        name: par-sheet
        path: par_sheet.csv
